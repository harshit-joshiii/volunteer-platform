{% extends "base.html" %}

{% block content %}
<div class="max-w-4xl mx-auto px-6 py-12">
    <div class="text-center mb-10">
        <h1 class="text-5xl font-bold text-[#1B5E20] mb-4">Join as a Volunteer</h1>
        <p class="text-xl text-gray-600">Help local NGOs by sharing your skills and availability</p>
    </div>

    <form method="POST" class="bg-white rounded-3xl shadow-xl p-10">
        <div class="grid md:grid-cols-2 gap-8">
            <!-- Left Column -->
            <div>
                <div class="mb-6">
                    <label class="block text-sm font-medium text-gray-700 mb-2">Full Name</label>
                    <input type="text" name="name" required 
                           pattern="[A-Za-z\s]{2,}" 
                           title="Please enter at least 2 letters (only letters and spaces)"
                           class="w-full px-5 py-4 border border-gray-300 rounded-2xl focus:outline-none focus:border-[#1B5E20]">
                </div>

                <div class="mb-6">
                    <label class="block text-sm font-medium text-gray-700 mb-2">Email Address</label>
                    <input type="email" name="email" required 
                           title="Please enter a valid email address (e.g., name@example.com)"
                           class="w-full px-5 py-4 border border-gray-300 rounded-2xl focus:outline-none focus:border-[#1B5E20]">
                </div>

                <div class="mb-6">
                    <label class="block text-sm font-medium text-gray-700 mb-2">Password</label>
                    <input type="password" name="password" required 
                           class="w-full px-5 py-4 border border-gray-300 rounded-2xl focus:outline-none focus:border-[#1B5E20]">
                </div>

                <div class="mb-6">
                    <label class="block text-sm font-medium text-gray-700 mb-2">Location (City)</label>
                    <input type="text" name="location" value="Vadodara" required 
                           class="w-full px-5 py-4 border border-gray-300 rounded-2xl focus:outline-none focus:border-[#1B5E20]">
                </div>
            </div>

            <!-- Right Column -->
            <div>
                <div class="mb-6">
                    <label class="block text-sm font-medium text-gray-700 mb-2">Skills (Select multiple)</label>
                    <select name="skills" multiple required 
                            class="w-full px-5 py-4 border border-gray-300 rounded-2xl focus:outline-none focus:border-[#1B5E20]">
                        {% for skill in skills_options %}
                        <option value="{{ skill }}">{{ skill }}</option>
                        {% endfor %}
                    </select>
                    <p class="text-xs text-gray-500 mt-1">Hold Ctrl/Cmd to select multiple</p>
                </div>

                <div class="mb-6">
                    <label class="block text-sm font-medium text-gray-700 mb-2">Interests (Select multiple)</label>
                    <select name="interests" multiple required 
                            class="w-full px-5 py-4 border border-gray-300 rounded-2xl focus:outline-none focus:border-[#1B5E20]">
                        {% for interest in interests_options %}
                        <option value="{{ interest }}">{{ interest }}</option>
                        {% endfor %}
                    </select>
                </div>
            </div>
        </div>

        <!-- Availability -->
        <div class="mt-8">
            <label class="block text-sm font-medium text-gray-700 mb-4">Availability</label>
            <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
                <label class="flex items-center gap-3 bg-gray-50 p-4 rounded-2xl cursor-pointer hover:bg-gray-100">
                    <input type="checkbox" name="availability" value="Weekdays" class="w-5 h-5 accent-[#1B5E20]">
                    <span>Weekdays</span>
                </label>
                <label class="flex items-center gap-3 bg-gray-50 p-4 rounded-2xl cursor-pointer hover:bg-gray-100">
                    <input type="checkbox" name="availability" value="Weekends" class="w-5 h-5 accent-[#1B5E20]">
                    <span>Weekends</span>
                </label>
                <label class="flex items-center gap-3 bg-gray-50 p-4 rounded-2xl cursor-pointer hover:bg-gray-100">
                    <input type="checkbox" name="availability" value="Morning" class="w-5 h-5 accent-[#1B5E20]">
                    <span>Morning</span>
                </label>
                <label class="flex items-center gap-3 bg-gray-50 p-4 rounded-2xl cursor-pointer hover:bg-gray-100">
                    <input type="checkbox" name="availability" value="Evening" class="w-5 h-5 accent-[#1B5E20]">
                    <span>Evening</span>
                </label>
            </div>
        </div>

        <!-- Bio -->
        <div class="mt-8">
            <label class="block text-sm font-medium text-gray-700 mb-2">Short Bio / Why do you want to volunteer?</label>
            <textarea name="bio" rows="5" 
                      class="w-full px-5 py-4 border border-gray-300 rounded-3xl focus:outline-none focus:border-[#1B5E20]"
                      placeholder="I love teaching kids coding and want to contribute to my community..."></textarea>
        </div>

        <div class="mt-10 text-center">
            <button type="submit" 
                    class="bg-[#1B5E20] hover:bg-green-800 text-white px-12 py-5 rounded-3xl text-xl font-semibold transition">
                Register & Find My Matches
            </button>
        </div>
    </form>
</div>
{% endblock %}
