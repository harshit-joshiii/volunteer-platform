{% extends "base.html" %}
{% block content %}
<div class="max-w-md mx-auto py-16 px-6">
    <h1 class="text-4xl font-bold text-center text-[#1B5E20] mb-8">Log In</h1>
    {% if error %}
        <div class="bg-red-100 text-red-700 p-4 rounded-2xl mb-6">{{ error }}</div>
    {% endif %}
    <form method="POST" class="bg-white p-8 rounded-3xl shadow-xl">
        <div class="mb-6">
            <label class="block text-sm font-medium mb-2">Email Address</label>
            <input type="email" name="email" required class="w-full px-5 py-4 border rounded-2xl">
        </div>
        <div class="mb-6">
            <label class="block text-sm font-medium mb-2">Password</label>
            <input type="password" name="password" required class="w-full px-5 py-4 border rounded-2xl">
        </div>
        <button type="submit" class="w-full bg-[#1B5E20] text-white py-4 rounded-2xl font-semibold">Log In</button>
    </form>
    <p class="text-center mt-6">Don't have an account? <a href="{{ url_for('volunteer_register') }}" class="text-[#FF6F00]">Register as Volunteer</a> or <a href="{{ url_for('ngo_register') }}" class="text-[#FF6F00]">NGO</a></p>
</div>
{% endblock %}
